type Pair @entity(immutable: false) {
  id: ID!
  token0: Token!
  token1: Token!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  totalSupply: BigDecimal!
  token0Price: BigDecimal!
  token1Price: BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  txCount: BigInt!
  createdAtTimestamp: BigInt!
  createdAtBlockNumber: BigInt!
  pairDayData: [PairDayData!]! @derivedFrom(field: "pair")
  mints: [Mint!]! @derivedFrom(field: "pair")
  burns: [Burn!]! @derivedFrom(field: "pair")
  swaps: [Swap!]! @derivedFrom(field: "pair")
}

type Token @entity(immutable: false) {
  id: ID!
  symbol: String!
  name: String!
  decimals: BigInt!
  totalSupply: BigDecimal!
  tradeVolume: BigDecimal!
  txCount: BigInt!
  poolCount: BigInt!
  pairsBase: [Pair!]! @derivedFrom(field: "token0")
  pairsQuote: [Pair!]! @derivedFrom(field: "token1")
  tokenDayData: [TokenDayData!]! @derivedFrom(field: "token")
  priceUSD: BigDecimal!
}

type MintondexDayData @entity(immutable: false) {
  id: ID!
  date: Int!
  volumeUSD: BigDecimal!
  tvlUSD: BigDecimal!
  txCount: BigInt!
}

type PairDayData @entity(immutable: false) {
  id: ID!
  date: Int!
  pair: Pair!
  reserve0: BigDecimal!
  reserve1: BigDecimal!
  volumeToken0: BigDecimal!
  volumeToken1: BigDecimal!
  volumeUSD: BigDecimal!
  txCount: BigInt!
}

type Mint @entity(immutable: false) {
  id: ID!
  pair: Pair!
  timestamp: BigInt!
  sender: Bytes!
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal!
  logIndex: BigInt
}

type Burn @entity(immutable: false) {
  id: ID!
  pair: Pair!
  timestamp: BigInt!
  sender: Bytes!
  amount0: BigDecimal!
  amount1: BigDecimal!
  amountUSD: BigDecimal!
  logIndex: BigInt
}

type Swap @entity(immutable: false) {
  id: ID!
  pair: Pair!
  timestamp: BigInt!
  sender: Bytes!
  amount0In: BigDecimal!
  amount1In: BigDecimal!
  amount0Out: BigDecimal!
  amount1Out: BigDecimal!
  amountUSD: BigDecimal!
  to: Bytes!
  logIndex: BigInt
}

type TokenDayData @entity(immutable: false) {
  id: ID!
  date: Int!
  token: Token!
  priceUSD: BigDecimal!
  volumeUSD: BigDecimal!
  tvlUSD: BigDecimal!
  txCount: BigInt!
}
